<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <title>Карточка товара | Magic Vibes - Склад</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%237c3aed'/%3E%3Cpath fill='%23fff' d='M8 22V10h2.8l3.4 6.1L17.5 10H20v12h-2.5v-7.2l-2.8 5h-1.4l-2.8-5V22H8z'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell product-page-shell">
      <header class="app-header">
        <div>
          <h1 id="productPageTitle">Карточка товара</h1>
          <p id="productPageMeta">Ozon + Yandex Market, поставщики, PriceMaster и история цен.</p>
        </div>
        <div class="header-actions">
          <button type="button" id="productRefreshPrices" class="secondary-button">Обновить цены</button>
          <a class="secondary-link-button" href="/">Назад в склад</a>
        </div>
      </header>

      <section id="productPageContent" class="product-page-content">
        <div class="empty">Загружаю карточку...</div>
      </section>
    </main>
    <div id="aiImageModal" class="ai-inline-modal hidden" role="dialog" aria-modal="true" aria-labelledby="aiImageTitle">
      <div class="ai-inline-card">
        <div class="ai-inline-head">
          <div>
            <span class="eyebrow">AI-фото Ozon</span>
            <h3 id="aiImageTitle">Генерация фото на месте</h3>
            <p id="aiImageProductMeta">Карточка Ozon</p>
          </div>
          <button id="aiImageCloseButton" class="icon-button" type="button" aria-label="Закрыть">×</button>
        </div>
        <div class="ai-inline-product">
          <strong id="aiImageProductName">Товар</strong>
          <span id="aiImageStatus">Проверьте промпт и сгенерируйте вариант.</span>
        </div>
        <div class="ai-inline-grid">
          <section>
            <div class="ai-inline-label">Исходное фото</div>
            <div id="aiImageCurrentPreview" class="ai-inline-preview"></div>
          </section>
          <section>
            <div class="ai-inline-label">AI-черновик</div>
            <div id="aiImagePreview" class="ai-inline-preview ai-inline-preview--result"></div>
          </section>
        </div>
        <label class="ai-inline-field">
          URL исходного фото
          <input id="aiImageSourceInput" type="url" placeholder="https://..." />
        </label>
        <label class="ai-inline-field">
          Промпт для генерации
          <textarea id="aiImagePromptInput" rows="5" placeholder="Промпт заполнится автоматически по товару"></textarea>
        </label>
        <div class="ai-inline-actions">
          <button id="aiImageGenerateButton" class="primary-button" type="button">Сгенерировать</button>
          <button id="aiImageApproveButton" class="success-button" type="button" disabled>✓ Поставить фото</button>
          <button id="aiImageRejectButton" class="secondary-button" type="button" disabled>× Не изменять</button>
          <button id="aiImageCancelButton" class="text-button" type="button">Закрыть</button>
        </div>
      </div>
    </div>

    <script src="/product.js"></script>
  </body>
</html>
